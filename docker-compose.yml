
services:
  postgres:
    image: postgres:16-alpine
    container_name: tanuki-postgres
    environment:
      POSTGRES_USER: tanuki
      POSTGRES_PASSWORD: tanuki_password
      POSTGRES_DB: tanuki_auth
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanuki"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tanuki-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
